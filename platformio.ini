; ============================================================================
; PlatformIO configuration for STM32G474RE
; SD_Main_Codebase
; Main system hosting Kayla CAN subsystem
;
; Driver model:
;   - HAL is REQUIRED (FDCAN, SysTick, delays, MSP init)
;   - LL is used selectively (RCC, GPIO, clocks, low-level init)
;  - - HAL and LL are allowed to coexist
; ============================================================================

[env:nucleo_g474re]
platform = ststm32
board = nucleo_g474re
framework = stm32cube

upload_protocol = stlink
monitor_speed = 115200 ; Test 115 vs 115200 bps for UART logging
monitor_filters = colorize


build_flags =
  ; --------------------------------------------------------------------------
  ; MCU selection
  ; Required for correct CMSIS device headers and register definitions
  ; --------------------------------------------------------------------------
  -D STM32G474xx

  ; --------------------------------------------------------------------------
  ; Enable HAL drivers
  ;
  ; REQUIRED because:
  ;   - can_comm.c uses HAL_FDCAN_*
  ;   - timers.c uses HAL_GetTick / HAL_Delay
  ;   - SysTick_Handler calls HAL_IncTick
  ;   - stm32g4xx_hal_msp.c is present
  ; --------------------------------------------------------------------------
  -D USE_HAL_DRIVER

  ; --------------------------------------------------------------------------
  ; Enable Low-Layer (LL) drivers
  ;
  ; REQUIRED because:
  ;   - LL_APB*_EnableClock() is used (RCC control)
  ;   - LL_PWR_* functions are used during early init
  ;   - Kayla’s CAN init expects LL symbols to exist
  ;
  ; This does NOT disable HAL.
  ; It simply exposes LL headers alongside HAL.
  ; --------------------------------------------------------------------------
  -D USE_LL_DRIVER

  ; --------------------------------------------------------------------------
  ; External oscillator frequency
  ;
  ; NUCLEO-G474RE uses ST-Link MCO as HSE (24 MHz).
  ; HAL clock calculations depend on this value.
  ; --------------------------------------------------------------------------
  -D HSE_VALUE=24000000U

  ; --------------------------------------------------------------------------
  ; FDCAN kernel clock frequency
  ;
  ; Used by Kayla's CAN timing calculations in can_comm.c.
  ; Must match PLLQ configuration:
  ;   PLLQ = 80 MHz → FDCAN kernel clock = 80 MHz
  ; --------------------------------------------------------------------------
  -D FDCAN_KERNEL_CLK_HZ=80000000

; --------------------------------------------------------------------------
; Notes
;
; - CMSIS and HAL include paths are provided automatically by PlatformIO
; - Do NOT manually add STM32 HAL or CMSIS include directories
; - HAL and LL coexist cleanly when both drivers are enabled
; --------------------------------------------------------------------------
